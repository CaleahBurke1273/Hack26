<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Community Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #4B2E83;
            color: white;
            padding: 20px;
            margin: 0;
        }

        .layout-container {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .main-feed {
            flex: 1;
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: white;
            border-radius: 12px;
            border: 4px solid #FDB913;
            padding: 15px;
            color: #4B2E83;
            align-self: flex-start;
        }

        .sidebar h3 {
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            color: #888;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        .sidebar-item {
            padding: 10px 14px;
            margin-bottom: 6px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .sidebar-item:hover {
            background: #f0f0f0;
        }

        .sidebar-item.active {
            background: #4B2E83;
            color: white;
        }

        .post {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            border: 4px solid #FDB913;
            color: #4B2E83;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .pfp {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #FDB913;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #4B2E83;
            font-size: 20px;
        }

        .tags {
            margin-top: 10px;
        }

        .tag {
            display: inline-block;
            background: #4B2E83;
            color: white;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 6px;
        }

        input,
        textarea,
        select {
            display: block;
            width: 100%;
            max-width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border: 2px solid #FDB913;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            color: #4B2E83;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        button.post-btn {
            padding: 12px 20px;
            background-color: #FDB913;
            color: #4B2E83;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        button.post-btn:hover {
            background-color: #e0a800;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            border: 4px solid #FDB913;
            margin-bottom: 30px;
            color: #4B2E83;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .logo {
            font-weight: bold;
            font-size: 24px;
        }

        .search-bar {
            display: flex;
            flex: 1;
            margin: 0 40px;
        }

        .search-bar input {
            width: 100%;
            margin-bottom: 0;
            padding: 10px;
        }

        .nav-buttons button {
            margin-left: 8px;
            margin-top: 0;
            padding: 10px 16px;
            background-color: #FDB913;
            color: #4B2E83;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-buttons button:hover {
            background-color: #e0a800;
        }

        h2 { margin-top: 0; }
        hr { border: 1px solid rgba(255, 255, 255, 0.2); margin: 30px 0;}
        .post-input-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 4px solid #FDB913;
            color: #4B2E83;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">StudentBlog</div>
        <div class="search-bar">
            <input type="text" placeholder="Search all posts..." id="searchInput" oninput="loadPosts()">
        </div>
        <div class="nav-buttons">
            <button onclick="goHome()">Home</button>
            <button onclick="goPosts()">Posts</button>
            <button onclick="goChats()">Chats</button>
            <button onclick="goProfile()">My Profile</button>
        </div>
    </div>

    <div class="layout-container">
        <!-- Main Feed -->
        <div class="main-feed">
            <h2>Community Feed</h2>

            <!-- Post Inputs Box -->
            <div class="post-input-container">
                <div id="writePostHeader" onclick="togglePostForm()" style="cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="margin:0; user-select: none;">Write a Post</h3>
                    <span id="postToggleIcon" style="font-size: 18px; font-weight: bold; user-select: none;">＋</span>
                </div>
                
                <div id="postFormInputs" style="display: none; margin-top: 20px;">
                    <input id="titleInput" placeholder="Post title">
                    <textarea id="contentInput" placeholder="Write your post..."></textarea>
                    <select id="communitySelect">
                        <option value="">Select a community to post in...</option>
                        <optgroup label="Interests">
                            <option value="Programming">Programming</option>
                            <option value="Design">Design</option>
                            <option value="Business">Business</option>
                            <option value="Music">Music</option>
                            <option value="Sports">Sports</option>
                            <option value="Gaming">Gaming</option>
                        </optgroup>
                        <optgroup label="Courses">
                            <option value="CP104">CP104</option>
                            <option value="CP164">CP164</option>
                            <option value="MA103">MA103</option>
                            <option value="BU111">BU111</option>
                            <option value="EC120">EC120</option>
                        </optgroup>
                    </select>
                    <button class="post-btn" onclick="createPost()">Submit Post</button>
                </div>
            </div>

            <hr>

            <div id="posts"></div>
        </div>

        <!-- Right Sidebar -->
        <div class="sidebar">
            <div class="sidebar-item active" onclick="setCommunity('')" id="sidebar-all">🌎 All Communities</div>

            <h3>Interests</h3>
            <div class="sidebar-item" onclick="setCommunity('Programming')" id="sidebar-Programming">Programming</div>
            <div class="sidebar-item" onclick="setCommunity('Design')" id="sidebar-Design">Design</div>
            <div class="sidebar-item" onclick="setCommunity('Business')" id="sidebar-Business">Business</div>
            <div class="sidebar-item" onclick="setCommunity('Music')" id="sidebar-Music">Music</div>
            <div class="sidebar-item" onclick="setCommunity('Sports')" id="sidebar-Sports">Sports</div>
            <div class="sidebar-item" onclick="setCommunity('Gaming')" id="sidebar-Gaming">Gaming</div>

            <h3>Courses Taken</h3>
            <div class="sidebar-item" onclick="setCommunity('CP104')" id="sidebar-CP104">CP104</div>
            <div class="sidebar-item" onclick="setCommunity('CP164')" id="sidebar-CP164">CP164</div>
            <div class="sidebar-item" onclick="setCommunity('MA103')" id="sidebar-MA103">MA103</div>
            <div class="sidebar-item" onclick="setCommunity('BU111')" id="sidebar-BU111">BU111</div>
            <div class="sidebar-item" onclick="setCommunity('EC120')" id="sidebar-EC120">EC120</div>
        </div>
    </div>

    <script>
        let activeCommunity = '';

        function setCommunity(community) {
            activeCommunity = community;

            // Update Sidebar visually
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            if (community === '') {
                document.getElementById('sidebar-all').classList.add('active');
            } else {
                document.getElementById('sidebar-' + community).classList.add('active');
            }

            // Also dynamically update the 'Select a community' dropdown to match if possible
            const selectEl = document.getElementById('communitySelect');
            if(community !== '') {
                selectEl.value = community;
            }

            loadPosts();
        }

        async function loadPosts() {
            try {
                const res = await fetch('/posts');
                if (!res.ok) throw new Error(`Load error: ${res.status}`);

                const posts = await res.json();
                const postsDiv = document.getElementById('posts');
                postsDiv.innerHTML = '';

                const searchTerm = (document.getElementById('searchInput').value || '').toLowerCase();

                posts
                    .filter(post => {
                        const matchesSearch = !searchTerm || 
                            post.title.toLowerCase().includes(searchTerm) || 
                            post.content.toLowerCase().includes(searchTerm) || 
                            (post.author && post.author.toLowerCase().includes(searchTerm)) ||
                            (post.tags && post.tags.some(tag => tag.toLowerCase().includes(searchTerm)));
                        const matchesCommunity = !activeCommunity || (post.tags && post.tags.includes(activeCommunity));
                        
                        // If user is actively searching, show results from ANY community globally
                        if (searchTerm) {
                            return matchesSearch;
                        }
                        
                        // Otherwise, follow the sidebar community filter
                        return matchesCommunity;
                    })
                    .forEach(post => {
                        const div = document.createElement('div');
                        div.className = 'post';

                        const firstLetter = post.author ? post.author.charAt(0).toUpperCase() : '?';

                        const tagsHTML = (post.tags || []).map(tag => `<span class="tag">#${tag}</span>`).join('');

                        div.innerHTML = `
                    <div class="post-header">
                        <div class="pfp">${firstLetter}</div>
                        <div>
                            <h3 style="margin:0; margin-bottom: 3px;">${post.title}</h3>
                            <small>By ${post.author} • ${post.time || ''}</small>
                        </div>
                    </div>
                    <p>${post.content}</p>
                    <div class="tags">${tagsHTML}</div>
                `;

                        postsDiv.appendChild(div);
                    });
            } catch (error) {
                console.error('Failed to load posts:', error);
            }
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        function goPosts() {
            window.location.href = 'blog.html';
        }

        function goChats() {
            window.location.href = 'dm.html';
        }

        function goProfile() {
            window.location.href = 'profile.html';
        }

        function togglePostForm() {
            const formInputs = document.getElementById('postFormInputs');
            const icon = document.getElementById('postToggleIcon');
            if (formInputs.style.display === 'none') {
                formInputs.style.display = 'block';
                icon.textContent = '－';
            } else {
                formInputs.style.display = 'none';
                icon.textContent = '＋';
            }
        }

        async function createPost() {
            const signedInUser = localStorage.getItem("signedInUser");
            const profileDataRaw = localStorage.getItem("profileData");
            let author = signedInUser || 'Anonymous';
            if (profileDataRaw) {
                try {
                    const profileData = JSON.parse(profileDataRaw);
                    if (profileData.firstName) author = profileData.firstName;
                } catch(e) {}
            }

            const title = document.getElementById('titleInput').value.trim();
            const content = document.getElementById('contentInput').value.trim();
            const community = document.getElementById('communitySelect').value;

            if (!title || !content || !community) {
                alert('Please provide a title, content, and select a community to post in.');
                return;
            }

            const tags = [community];

            await fetch('/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content, author, tags })
            });

            document.getElementById('titleInput').value = '';
            document.getElementById('contentInput').value = '';

            // Hide the form automatically after submission
            document.getElementById('postFormInputs').style.display = 'none';
            document.getElementById('postToggleIcon').textContent = '＋';

            loadPosts();
        }

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            if (query) {
                document.getElementById('searchInput').value = query;
            }
            loadPosts(); // Initial load
            setInterval(loadPosts, 3000); // Auto-refresh interval
        });
    </script>

</body>

</html>
