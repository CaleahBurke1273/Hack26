<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Community Blog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #4B2E83;
            color: white;
            padding: 20px;
        }

        .post {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            border: 4px solid #FDB913;
            color: #4B2E83;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .pfp {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #FDB913;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #4B2E83;
            font-size: 20px;
        }

        .tags {
            margin-top: 10px;
        }

        .tag {
            display: inline-block;
            background: #4B2E83;
            color: white;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 6px;
        }

        input,
        textarea {
            display: block;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            padding: 10px;
            border: 2px solid #FDB913;
            border-radius: 8px;
            box-sizing: border-box;
        }

        textarea {
            height: 80px;
        }

        button {
            padding: 10px 16px;
            background-color: #FDB913;
            color: #4B2E83;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #e0a800;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            border: 4px solid #FDB913;
            margin-bottom: 20px;
            color: #4B2E83;
        }

        .logo {
            font-weight: bold;
            font-size: 20px;
        }

        .search-bar input {
            width: 250px;
            margin-bottom: 0;
            padding: 10px;
        }

        .nav-buttons button {
            margin-left: 8px;
            margin-top: 0;
        }

        h2 {
            margin-top: 0;
        }

        hr {
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">StudentBlog</div>
        <div class="search-bar">
            <input type="text" placeholder="Search posts..." id="searchInput">
        </div>
        <div class="nav-buttons">
            <button onclick="goHome()">Home</button>
            <button onclick="goPosts()">Posts</button>
            <button onclick="goChats()">Chats</button>
            <button onclick="goProfile()">My Profile</button>
        </div>
    </div>

    <h2>Community Blog</h2>

    <!-- Post Inputs -->
    <input id="authorInput" placeholder="Your name (optional)">
    <input id="titleInput" placeholder="Post title">
    <textarea id="contentInput" placeholder="Write your post..."></textarea>
    <input id="tagsInput" placeholder="Tags (comma separated)">
    <button onclick="createPost()">Post</button>

    <hr>

    <div id="posts"></div>

    <script>
        async function loadPosts() {
            try {
                const res = await fetch('/posts');
                if (!res.ok) throw new Error(`Load error: ${res.status}`);

                const posts = await res.json();
                const postsDiv = document.getElementById('posts');
                postsDiv.innerHTML = '';

                const searchTerm = (document.getElementById('searchInput').value || '').toLowerCase();

                posts
                    .filter(post => !searchTerm || post.title.toLowerCase().includes(searchTerm) || post.content.toLowerCase().includes(searchTerm) || post.author.toLowerCase().includes(searchTerm))
                    .forEach(post => {
                        const div = document.createElement('div');
                        div.className = 'post';

                        const firstLetter = post.author ? post.author.charAt(0).toUpperCase() : '?';

                        const tagsHTML = (post.tags || []).map(tag => `<span class="tag">#${tag}</span>`).join('');

                        div.innerHTML = `
                    <div class="post-header">
                        <div class="pfp">${firstLetter}</div>
                        <div>
                            <h3>${post.title}</h3>
                            <small>By ${post.author} • ${post.time || ''}</small>
                        </div>
                    </div>
                    <p>${post.content}</p>
                    <div class="tags">${tagsHTML}</div>
                `;

                        postsDiv.appendChild(div);
                    });
            } catch (error) {
                console.error('Failed to load posts:', error);
            }
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        function goPosts() {
            window.location.href = 'blog.html';
        }

        function goChats() {
            window.location.href = 'dm.html';
        }

        function goProfile() {
            window.location.href = 'profile.html';
        }

        async function createPost() {
            const author = document.getElementById('authorInput').value || 'Anonymous';
            const title = document.getElementById('titleInput').value.trim();
            const content = document.getElementById('contentInput').value.trim();
            const tagsRaw = document.getElementById('tagsInput').value;

            if (!title || !content) {
                alert('Please provide both title and content.');
                return;
            }

            const tags = tagsRaw.split(',').map(t => t.trim()).filter(t => t.length > 0);

            await fetch('/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content, author, tags })
            });

            document.getElementById('authorInput').value = '';
            document.getElementById('titleInput').value = '';
            document.getElementById('contentInput').value = '';
            document.getElementById('tagsInput').value = '';

            loadPosts();
        }

        setInterval(loadPosts, 3000);
        loadPosts();
    </script>

</body>

</html>
