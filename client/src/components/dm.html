<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<body>

<div class="navbar">
    <div class="logo">StudentBlog</div>

    <div class="search-bar">
        <input type="text" placeholder="Search posts...">
    </div>

    <div class="nav-buttons">
        <button onclick="goHome()">Home</button>
        <button onclick="goPosts()">Posts</button>
        <button onclick="goChats()">Chats</button>
        <button onclick="goProfile()">My Profile</button>
    </div>
</div>

<h2>Community Blog</h2>

<title>Direct Messages</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    padding: 20px;
}

#chatBox {
    background: white;
    height: 400px;
    overflow-y: auto;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
}

.message {
    margin: 8px 0;
    max-width: 60%;
    padding: 8px 12px;
    border-radius: 12px;
    clear: both;
}

.me {
    background: #d1e7ff;
    float: right;
    text-align: right;
}

.other {
    background: #e5e5e5;
    float: left;
}

#controls {
    display: flex;
    gap: 8px;
}

input {
    padding: 8px;
    flex: 1;
}

button {
    padding: 8px 12px;
}
</style>
</head>

<script>
function goHome() {
    window.location.href = "/index.html";
}

function goPosts() {
    window.location.href = "/blog.html";
}

function goChats() {
    window.location.href = "/dm.html";
}

function goProfile() {
    window.location.href = "/profile.html";
}
</script>
<body>
<div class="navbar">
    <div class="logo">StudentBlog</div>

    <div class="search-bar">
        <input type="text" placeholder="Search posts...">
    </div>

    <div class="nav-buttons">
        <button onclick="goHome()">Home</button>
        <button onclick="goPosts()">Posts</button>
        <button onclick="goChats()">Chats</button>
        <button onclick="goProfile()">My Profile</button>
    </div>
</div>

<h2>Direct Messages</h2>

<input id="meInput" placeholder="Your name">
<input id="otherInput" placeholder="Chat with">

<div id="chatBox"></div>

<div id="controls">
    <input id="msgInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
async function loadMessages() {
    const me = document.getElementById('meInput').value;
    const other = document.getElementById('otherInput').value;

    if (!me || !other) return;

    const res = await fetch(`/messages?user=${me}&with=${other}`);
    const messages = await res.json();

    const box = document.getElementById('chatBox');
    box.innerHTML = '';

    messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'message ' + (msg.from === me ? 'me' : 'other');
        div.innerHTML = `<strong>${msg.from}</strong><br>${msg.text}`;
        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
    const me = document.getElementById('meInput').value;
    const other = document.getElementById('otherInput').value;
    const text = document.getElementById('msgInput').value;

    if (!text) return;

    await fetch('/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: me, to: other, text })
    });

    document.getElementById('msgInput').value = '';
    loadMessages();
}

// Auto refresh
setInterval(loadMessages, 2000);
</script>

</body>
</html>
