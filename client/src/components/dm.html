<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Direct Messages</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #4B2E83;
    color: white;
    padding: 20px;
}

#chatBox {
    background: white;
    height: 400px;
    overflow-y: auto;
    padding: 15px;
    border-radius: 12px;
    border: 4px solid #FDB913;
    margin-bottom: 10px;
    color: #4B2E83;
}

.message {
    margin: 8px 0;
    max-width: 60%;
    padding: 10px 14px;
    border-radius: 12px;
    clear: both;
}

.me {
    background: #FDB913;
    color: #4B2E83;
    float: right;
    text-align: right;
}

.other {
    background: #e5e5e5;
    color: #4B2E83;
    float: left;
}

#controls {
    display: flex;
    gap: 8px;
}

input {
    padding: 12px;
    flex: 1;
    border: 2px solid #FDB913;
    border-radius: 8px;
}

button {
    padding: 12px 18px;
    background-color: #FDB913;
    color: #4B2E83;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background-color: #e0a800;
}

.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: white;
    padding: 15px 20px;
    border-radius: 12px;
    border: 4px solid #FDB913;
    margin-bottom: 20px;
    color: #4B2E83;
}
.logo { font-weight: bold; font-size: 20px; }
.search-bar input { width: 250px; padding: 10px; margin-bottom: 0; }
.nav-buttons button { margin-left: 8px; margin-top: 0; padding: 10px 16px; }
h2 { color: white; margin-top: 0; }
</style>
<script>
function goHome() {
    window.location.href = "index.html";
}

function goPosts() {
    window.location.href = "blog.html";
}

function goChats() {
    window.location.href = "dm.html";
}

function goProfile() {
    window.location.href = "profile.html";
}
</script>
</head>
<body>

<div class="navbar">
    <div class="logo">StudentBlog</div>
    <div class="search-bar">
        <input type="text" placeholder="Search posts...">
    </div>
    <div class="nav-buttons">
        <button onclick="goHome()">Home</button>
        <button onclick="goPosts()">Posts</button>
        <button onclick="goChats()">Chats</button>
        <button onclick="goProfile()">My Profile</button>
    </div>
</div>

<h2>Direct Messages</h2>

<div style="display: flex; gap: 8px; margin-bottom: 10px;">
    <input id="meInput" placeholder="Your name">
    <input id="otherInput" placeholder="Chat with">
</div>

<div id="chatBox"></div>

<div id="controls">
    <input id="msgInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
async function loadMessages() {
    const me = document.getElementById('meInput').value;
    const other = document.getElementById('otherInput').value;

    if (!me || !other) return;

    const res = await fetch(`/messages?user=${me}&with=${other}`);
    const messages = await res.json();

    const box = document.getElementById('chatBox');
    box.innerHTML = '';

    messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'message ' + (msg.from === me ? 'me' : 'other');
        div.innerHTML = `<strong>${msg.from}</strong><br>${msg.text}`;
        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
    const me = document.getElementById('meInput').value;
    const other = document.getElementById('otherInput').value;
    const text = document.getElementById('msgInput').value;

    if (!text) return;

    await fetch('/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: me, to: other, text })
    });

    document.getElementById('msgInput').value = '';
    loadMessages();
}

// Auto refresh
setInterval(loadMessages, 2000);
</script>

</body>
</html>
