<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>

  <link rel="stylesheet" href="signin.css" />
</head>
<body>
  <div class="signin-container">
    <div class="signin-card">
      <h1>Laurier Help Hub</h1>
      <h2>Create Account</h2>

      <label for="newUsername">Create Username</label>
      <input type="text" id="newUsername" placeholder="Choose a username" />

      <label for="newPassword">Create Password</label>
      <input type="password" id="newPassword" placeholder="Choose a password" />

      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm password" />

      <button id="createAccountBtn">Create Account</button>
      <button id="backToSignInBtn" class="secondary-btn">Back to Sign In</button>
      <button onclick="window.location.href='index.html'" class="secondary-btn" style="margin-top: 10px;">Back to Home</button>

      <p id="createErrorMessage" class="error-message"></p>
    </div>
  </div>

  <script src="create-account.js"></script>
</body>
</html>
