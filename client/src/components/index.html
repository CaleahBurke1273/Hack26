<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laurier Student Hub</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #4B2E83;
            padding: 20px;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 10px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .logo {
            font-weight: bold;
            color: #4B2E83;
            font-size: 20px;
        }

        .nav-buttons button {
            margin-left: 8px;
            padding: 8px 16px;
            background-color: #FDB913;
            color: #4B2E83;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: auto;
            margin-top: 0;
        }

        .nav-buttons button:hover {
            background-color: #e0a800;
        }
        
        .hero {
            background: white;
            padding: 40px;
            border-radius: 12px;
            border: 4px solid #FDB913;
            max-width: 600px;
            margin: 40px auto;
            text-align: center;
        }
        
        .hero h1 {
            color: #4B2E83;
            margin-top: 0;
        }
        
        .account-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .account-links button {
            width: auto;
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">Laurier Hub</div>
        <div class="nav-buttons">
            <button onclick="goHome()">Home</button>
            <button onclick="goPosts()">Posts</button>
            <button onclick="goChats()">Chats</button>
            <button onclick="goProfile()">My Profile</button>
        </div>
    </div>

    <div class="hero">
        <h1>Welcome to Laurier Student Hub</h1>
        <p>Your central location for community discussions, direct messaging, and profile management.</p>
        
        <div class="account-links">
            <button onclick="window.location.href='signin.html'">Sign In</button>
            <button onclick="window.location.href='create-account.html'">Create Account</button>
        </div>
    </div>

    <script>
        function goHome() {
            window.location.href = 'index.html';
        }

        function goPosts() {
            window.location.href = 'blog.html';
        }

        function goChats() {
            window.location.href = 'dm.html';
        }

        function goProfile() {
            window.location.href = 'profile.html';
        }
    </script>
</body>
</html>
