<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Blog Home</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f4;
}

/* ===== Top Menu Bar ===== */
.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #222;
    padding: 10px 20px;
    color: white;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.search-bar input {
    padding: 6px;
    width: 250px;
    border-radius: 4px;
    border: none;
}

.nav-buttons button {
    margin-left: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

/* ===== Main Home Section ===== */
.home-container {
    width: 400px;
    margin: 80px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
}

.home-container h2 {
    margin-bottom: 20px;
}

.home-container button {
    margin: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}
</style>

<script>
function goHome() {
    window.location.href = "/index.html";
}
function goPosts() {
    window.location.href = "/blog.html";
}

function goChats() {
    window.location.href = "/dm.html";
}

function goProfile() {
    window.location.href = "/profile.html";
}
</script>
</head>

<body>

<!-- ===== NAVBAR ===== -->
<div class="navbar">
    <div class="logo">StudentBlog</div>

    <div class="search-bar">
        <input type="text" placeholder="Search posts...">
    </div>

    <div class="nav-buttons">
        <button onclick="goPosts()">Posts</button>
        <button onclick="goHome()">Home</button>
        <button onclick="goProfile()">My Profile</button>
    </div>
</div>

<!-- ===== HOME CONTENT ===== -->
<div class="home-container">
    <h2 id="greeting">Hi, </h2>

    <button onclick="goProfile()">My Profile</button>
    <button onclick="createPost()">Create Post</button>
</div>

<script>
// Load user name for greeting
async function loadProfile() {
    const res = await fetch('/profile');
    const data = await res.json();

    document.getElementById('greeting').innerText = "Hi, " + data.name;
}

// Run on load
loadProfile();
</script>

</body>
</html>
