<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laurier Sign In</title>

  <link rel="stylesheet" href="signin.css" />
</head>
<body>
  <div class="signin-container">
    <div class="signin-card">
      <h1>Laurier Help Hub</h1>
      <h2>Sign In</h2>

      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" />

      <button id="signinBtn">Sign In</button>
      <button id="goCreateBtn" class="secondary-btn">Create Account</button>
      <button onclick="window.location.href='index.html'" class="secondary-btn" style="margin-top: 10px;">Back to Home</button>

      <p id="errorMessage" class="error-message"></p>
    </div>
  </div>

  <script src="signin.js"></script>
</body>
</html>
